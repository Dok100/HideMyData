name: Checks

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - run: brew install swiftlint

      - name: Lint
        run: swiftlint --strict

      - name: Build
        run: xcodebuild -project Inkognito.xcodeproj -scheme Inkognito -sdk macosx build

      - name: Detection regressions
        run: CLANG_MODULE_CACHE_PATH=/private/tmp/swift-module-cache swift scripts/run_detection_regressions.swift
